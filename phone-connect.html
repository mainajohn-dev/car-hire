<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LUXDRIVE | Scan to Open on Phone</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  body { font-family: 'Montserrat', sans-serif; background: #121414; color: #e2e2e2; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  h1 { font-family: 'Playfair Display', serif; }
  canvas { border-radius: 12px; }
</style>
</head>
<body>
<div style="text-align:center; padding: 40px; max-width: 480px; margin: 0 auto;">
  <p style="color:#f2ca50; font-size:11px; letter-spacing:0.2em; text-transform:uppercase; margin-bottom:8px;">Mobile Access</p>
  <h1 style="font-size:2.5rem; color:#f2ca50; margin-bottom:8px;">LUXDRIVE</h1>
  <p style="color:#d0c5af; margin-bottom:32px;">Scan the QR code below with your phone to open the site.<br>Make sure your phone is on the <strong style="color:#e2e2e2;">same Wi-Fi</strong> as this PC.</p>

  <div style="background:#1e2020; border: 1px solid rgba(242,202,80,0.2); border-radius:16px; padding:32px; display:inline-block; margin-bottom:24px;">
    <canvas id="qrcode"></canvas>
  </div>

  <div style="background:#1e2020; border: 1px solid rgba(242,202,80,0.15); border-radius:12px; padding:16px; margin-bottom:24px;">
    <p style="font-size:11px; color:#d0c5af; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:4px;">Or type this URL on your phone:</p>
    <p id="urlDisplay" style="color:#f2ca50; font-size:1.1rem; font-weight:600; word-break:break-all;"></p>
  </div>

  <a href="index.html" style="display:inline-block; background:#f2ca50; color:#3c2f00; font-size:11px; letter-spacing:0.15em; text-transform:uppercase; font-weight:700; padding: 14px 36px; border-radius:4px; text-decoration:none;">
    Open Site on This PC
  </a>
</div>

<script>
  // Detect the server's host (works whether opened as file or via server)
  var host = window.location.hostname;
  if (host === '' || host === 'localhost' || host === '127.0.0.1') {
    host = '192.168.100.11';
  }
  var url = 'http://' + host + ':8080/index.html';
  document.getElementById('urlDisplay').textContent = url;

  QRCode.toCanvas(document.getElementById('qrcode'), url, {
    width: 220,
    color: { dark: '#1a1c1c', light: '#f2ca50' },
    errorCorrectionLevel: 'H',
    margin: 2
  });
</script>
</body>
</html>
